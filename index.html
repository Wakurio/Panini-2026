  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Panini 2026" />
  <title>Panini WC 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111; }
    #app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .header { background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 100%); color: #fff; padding: 14px 16px 12px; flex-shrink: 0; }
    .header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
    .header-title { font-size: 19px; font-weight: 800; margin-top: 2px; }
    .progress-row { display: flex; justify-content: space-between; font-size: 12px; margin: 8px 0 3px; opacity: 0.9; }
    .progress-bar { height: 7px; background: rgba(255,255,255,0.25); border-radius: 99px; }
    .progress-fill { height: 100%; background: #fff; border-radius: 99px; transition: width 0.4s; }
    .stats-row { display: flex; gap: 8px; margin-top: 8px; }
    .stat-box { flex: 1; border-radius: 10px; padding: 7px 4px; text-align: center; }
    .stat-val { font-size: 18px; font-weight: 800; }
    .stat-lbl { font-size: 9px; font-weight: 700; opacity: 0.85; margin-top: 1px; }
    .tabs { display: flex; background: #fff; border-bottom: 2px solid #e5e7eb; flex-shrink: 0; }
    .tab { flex: 1; padding: 11px 2px; border: none; background: transparent; font-size: 10px; font-weight: 700; cursor: pointer; color: #6b7280; border-bottom: 3px solid transparent; }
    .tab.active { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; }
    .album-body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 95px; overflow-y: auto; background: #fff; border-right: 1px solid #e5e7eb; flex-shrink: 0; }
    .sidebar-btn { display: block; width: 100%; text-align: left; padding: 8px 7px; border: none; cursor: pointer; background: transparent; border-left: 3px solid transparent; font-size: 10px; font-weight: 500; color: #374151; }
    .sidebar-btn.active { background: #eff6ff; border-left: 3px solid #1d4ed8; color: #1d4ed8; font-weight: 700; }
    .sidebar-sub { font-size: 9px; color: #9ca3af; margin-top: 1px; }
    .sidebar-sub.done { color: #16a34a; }
    .grid-area { flex: 1; overflow-y: auto; padding: 10px; }
    .grid-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #374151; }
    .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 6px; }
    .sticker { border-radius: 9px; padding: 7px 3px 5px; text-align: center; cursor: pointer; border: 2px solid #d1d5db; background: #e5e7eb; position: relative; user-select: none; -webkit-user-select: none; transition: transform 0.1s; }
    .sticker:active { transform: scale(0.92); }
    .sticker.owned { background: #bbf7d0; border-color: #86efac; }
    .sticker.double { background: #fde68a; border-color: #fcd34d; }
    .sticker-id { font-size: 10px; font-weight: 800; }
    .sticker-name { font-size: 7px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; color: #6b7280; }
    .sticker.missing .sticker-id { color: #6b7280; }
    .sticker.owned .sticker-id { color: #15803d; }
    .sticker.owned .sticker-name { color: #15803d; }
    .sticker.double .sticker-id { color: #b45309; }
    .sticker.double .sticker-name { color: #92400e; }
    .sticker-sub { font-size: 9px; margin-top: 1px; }
    .sticker.missing .sticker-sub { color: #9ca3af; }
    .sticker.owned .sticker-sub { color: #16a34a; font-weight: 700; }
    .foil-badge { font-size: 7px; background: linear-gradient(90deg,#f59e0b,#fbbf24); color: #fff; border-radius: 3px; padding: 0 3px; display: inline-block; margin-top: 1px; font-weight: 700; }
    .badge { position: absolute; top: -7px; right: -7px; background: #f59e0b; color: #fff; border-radius: 99px; font-size: 9px; font-weight: 800; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .hint { margin-top: 14px; font-size: 10px; color: #9ca3af; text-align: center; }
    .list-area { flex: 1; overflow-y: auto; padding: 12px; }
    .search-input { width: 100%; padding: 9px 11px; border-radius: 10px; border: 1.5px solid #e5e7eb; font-size: 13px; margin-bottom: 10px; outline: none; }
    .search-input:focus { border-color: #1d4ed8; }
    .list-sub { font-size: 11px; color: #6b7280; margin-bottom: 10px; }
    .group-label { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 5px; padding: 3px 7px; background: #f3f4f6; border-radius: 5px; }
    .group-block { margin-bottom: 12px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .dchip { display: flex; align-items: center; gap: 4px; background: #fef9c3; border: 1.5px solid #fcd34d; border-radius: 7px; padding: 5px 7px; }
    .dchip-id { font-weight: 800; font-size: 11px; }
    .dchip-name { font-size: 9px; color: #92400e; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dchip-count { font-size: 10px; color: #92400e; font-weight: 700; }
    .dchip-btn { background: #fcd34d; border: none; border-radius: 4px; width: 20px; height: 20px; cursor: pointer; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .dchip-btn.minus { background: #e5e7eb; }
    .mchip { background: #fee2e2; border: 1.5px solid #fca5a5; border-radius: 7px; padding: 6px 8px; font-size: 11px; font-weight: 700; color: #991b1b; cursor: pointer; transition: transform 0.1s; }
    .mchip:active { transform: scale(0.92); }
    .empty { text-align: center; margin-top: 50px; color: #9ca3af; }
    .empty-icon { font-size: 44px; }
    .empty-txt { font-weight: 700; margin-top: 10px; font-size: 15px; }
  </style>

const GROUPS=[...new Set(STICKERS.map(s=>s.group))];
const TOTAL=STICKERS.length;
const KEY="panini-wc2026-v3";

function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return {};}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}

let owned=load();
let view="album";
let activeGroup=GROUPS[0];
let search="";
let holdTimer=null;

function setCount(id,delta){
  owned[id]=Math.max(0,(owned[id]||0)+delta);
  if(owned[id]===0)delete owned[id];
  save(owned);render();
}
function resetSticker(id){delete owned[id];save(owned);render();}

function stats(){
  const o=STICKERS.filter(s=>(owned[s.id]||0)>=1).length;
  const doubles=STICKERS.filter(s=>(owned[s.id]||0)>=2);
  const dc=doubles.reduce((a,s)=>a+(owned[s.id]-1),0);
  const missing=STICKERS.filter(s=>!(owned[s.id]||0));
  return{o,dc,missing,doubles,pct:Math.round(o/TOTAL*100)};
}
function status(id){const c=owned[id]||0;return c===0?"missing":c===1?"owned":"double";}

function render(){
  const{o,dc,missing,doubles,pct}=stats();
  let html=`
  <div class="header">
    <div class="header-eyebrow">⚽ Coupe du Monde 2026</div>
    <div class="header-title">Ma Collection Panini</div>
    <div class="progress-row"><span>${o} / ${TOTAL} vignettes</span><span style="font-weight:800">${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="stats-row">
      <div class="stat-box" style="background:#bbf7d0"><div class="stat-val" style="color:#166534">${o}</div><div class="stat-lbl" style="color:#166534">Possédées</div></div>
      <div class="stat-box" style="background:#fecaca"><div class="stat-val" style="color:#991b1b">${TOTAL-o}</div><div class="stat-lbl" style="color:#991b1b">Manquantes</div></div>
      <div class="stat-box" style="background:#fde68a"><div class="stat-val" style="color:#92400e">${dc}</div><div class="stat-lbl" style="color:#92400e">Doubles</div></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${view==='album'?'active':''}" onclick="switchView('album')">📖 Album</button>
    <button class="tab ${view==='doubles'?'active':''}" onclick="switchView('doubles')">🔁 Doubles (${dc})</button>
    <button class="tab ${view==='missing'?'active':''}" onclick="switchView('missing')">❓ Manquantes (${TOTAL-o})</button>
  </div>`;

  if(view==="album"){
    html+=`<div class="album-body"><div class="sidebar">`;
    GROUPS.forEach(g=>{
      const gs=STICKERS.filter(s=>s.group===g);
      const go=gs.filter(s=>(owned[s.id]||0)>=1).length;
      const done=go===gs.length;
      html+=`<button class="sidebar-btn ${activeGroup===g?'active':''}" onclick="setGroup(${JSON.stringify(g)})">
        <div>${g}</div>
        <div class="sidebar-sub ${done?'done':''}">${go}/${gs.length}${done?' ✓':''}</div>
      </button>`;
    });
    html+=`</div><div class="grid-area"><div class="grid-title">${activeGroup}</div><div class="sticker-grid">`;
    STICKERS.filter(s=>s.group===activeGroup).forEach(s=>{
      const c=owned[s.id]||0;
      const st=status(s.id);
      const sub=st==='owned'?'✓':st==='double'?`×${c}`:'—';
      const badge=c>=2?`<div class="badge">×${c}</div>`:'';
      const foilBadge=s.foil?`<div class="foil-badge">FOIL</div>`:'';
      html+=`<div class="sticker ${st}" ontouchstart="startHold('${s.id}')" ontouchend="endTap('${s.id}',event)" ontouchcancel="cancelHold()" onclick="tap('${s.id}')" oncontextmenu="ctxMenu('${s.id}',event)">
        ${badge}
        <div class="sticker-id">${s.id}</div>
        <div class="sticker-name">${s.name}</div>
        ${foilBadge}
        <div class="sticker-sub">${sub}</div>
      </div>`;
    });
    html+=`</div><div class="hint">Tap = +1 · Appui long (0.6s) = remettre à 0</div></div></div>`;
  }
  else if(view==="doubles"){
    const fd=doubles.filter(s=>!search||s.id.toLowerCase().includes(search.toLowerCase())||s.name.toLowerCase().includes(search.toLowerCase()));
    html+=`<div class="list-area">
      <input class="search-input" type="search" placeholder="Rechercher (ex: BEL15, Messi…)" value="${search}" oninput="doSearch(this.value)" />`;
    if(!fd.length){html+=`<div class="empty"><div class="empty-icon">🎉</div><div class="empty-txt">Aucun double !</div></div>`;}
    else{
      html+=`<div class="list-sub">${fd.length} vignettes · ${fd.reduce((a,s)=>a+(owned[s.id]-1),0)} exemplaires à échanger</div>`;
      GROUPS.forEach(g=>{
        const gd=fd.filter(s=>s.group===g);
        if(!gd.length)return;
        html+=`<div class="group-block"><div class="group-label">${g}</div><div class="chips">`;
        gd.forEach(s=>{
          html+=`<div class="dchip"><span class="dchip-id">${s.id}</span><span class="dchip-name">${s.name}</span><span class="dchip-count">×${owned[s.id]}</span><button class="dchip-btn" onclick="setCount('${s.id}',1)">+</button><button class="dchip-btn minus" onclick="setCount('${s.id}',-1)">−</button></div>`;
        });
        html+=`</div></div>`;
      });
    }
    html+=`</div>`;
  }
  else{
    const fm=missing.filter(s=>!search||s.id.toLowerCase().includes(search.toLowerCase())||s.name.toLowerCase().includes(search.toLowerCase()));
    html+=`<div class="list-area">
      <input class="search-input" type="search" placeholder="Rechercher (ex: FRA20, Mbappe…)" value="${search}" oninput="doSearch(this.value)" />`;
    if(!fm.length){html+=`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-txt">Album complet !</div></div>`;}
    else{
      html+=`<div class="list-sub">${fm.length} vignettes manquantes</div>`;
      GROUPS.forEach(g=>{
        const gm=fm.filter(s=>s.group===g);
        if(!gm.length)return;
        html+=`<div class="group-block"><div class="group-label">${g} <span style="color:#9ca3af;font-weight:400">(${gm.length})</span></div><div class="chips">`;
        gm.forEach(s=>{html+=`<div class="mchip" onclick="tap('${s.id}')" title="${s.name}">${s.id}</div>`;});
        html+=`</div></div>`;
      });
    }
    html+=`</div>`;
  }
  document.getElementById("app").innerHTML=html;
}

function switchView(v){view=v;search="";render();}
function setGroup(g){activeGroup=g;render();}
function doSearch(v){search=v;render();}

function tap(id){setCount(id,1);}
function startHold(id){
  holdTimer=setTimeout(()=>{
    holdTimer="fired";
    resetSticker(id);
    if(navigator.vibrate)navigator.vibrate(30);
  },600);
}
function endTap(id,e){
  e.preventDefault();
  if(holdTimer==="fired"){holdTimer=null;return;}
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
  setCount(id,1);
}
function cancelHold(){if(holdTimer&&holdTimer!=="fired")clearTimeout(holdTimer);holdTimer=null;}
function ctxMenu(id,e){e.preventDefault();resetSticker(id);}

render();
</script>
